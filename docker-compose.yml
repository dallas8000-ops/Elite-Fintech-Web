# Elite Fintech Systems — production stack (VPS, Fly.io, AWS Cape Town, etc.)
#
# Usage:
#   cp .env.production.example .env
#   docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elite_fintech
      POSTGRES_USER: elite
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elite -d elite_fintech"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://elite:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/elite_fintech
      REDIS_URL: redis://redis:6379/0
      DEBUG: "False"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws/billing/}
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
